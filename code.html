<body>
    <h1>コードのかけら</h1>
    <h2>8進数の11を10進数へ変更</h2>
    <pre><code>
julia> parse(Int, "11", base = 8)
9
   </code></pre>

    <h2>10進数の10を9進数へ変更</h2>
    <pre><code>
julia> string(10, base = 9)
"11"
   </code></pre>
